<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAZAR TRAVELS | Billet d'avion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0F172A; --accent: #3B82F6; --turkish-red: #E81932; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; margin: 0; padding-top: 130px; }
        
        /* NAVBAR INTELLIGENTE STYLE APPLE */
        .nav-hazar { 
            background: var(--primary); 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            z-index: 1000; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 12px 16px;
            border-bottom: 3px solid var(--accent);
        }
        .nav-up { transform: translateY(-100%); }

        .brand-red { color: var(--turkish-red); font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
        
        /* FILTRES HORIZONTAUX MOBILE */
        .filter-wrapper {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 10px 0 5px 0;
            scrollbar-width: none;
        }
        .filter-wrapper::-webkit-scrollbar { display: none; }

        .filter-btn { 
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            color: #94A3B8;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* CARTES ET IMAGES */
        .card-flight { background: white; border-radius: 24px; overflow: hidden; border: 1px solid #E2E8F0; transition: 0.3s; }
        .img-container { height: 200px; position: relative; background: #CBD5E1; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .airline-label { color: var(--turkish-red); font-weight: 800; font-size: 12px; border-left: 3px solid var(--turkish-red); padding-left: 10px; margin: 12px 0; }
        
        .price-box { background: #F1F5F9; border-radius: 20px; padding: 15px; }
    </style>
</head>
<body>

    <nav id="navbar" class="nav-hazar">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-slate-900 font-black text-xl italic shadow-lg">H</div>
                <div>
                    <h1 class="text-white font-black text-lg uppercase italic leading-none">Hazar Travels</h1>
                    <p class="brand-red">Billet d'avion</p>
                </div>
            </div>
            <div class="filter-wrapper">
                <button onclick="applyFilter('all')" id="btn-all" class="filter-btn active">Tout</button>
                <button onclick="applyFilter('4')" id="btn-4" class="filter-btn">4 Jours</button>
                <button onclick="applyFilter('5')" id="btn-5" class="filter-btn">5 Jours</button>
                <button onclick="applyFilter('7')" id="btn-7" class="filter-btn">7 Jours</button>
                <button onclick="applyFilter('8')" id="btn-8" class="filter-btn">8 Jours</button>
                <button onclick="applyFilter('organise')" id="btn-organise" class="filter-btn text-amber-500 border-amber-500/20">Organisés</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-10">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        let dataStore = [];

        // Scroll Logic
        let prevScroll = window.pageYOffset;
        window.onscroll = () => {
            let currentScroll = window.pageYOffset;
            const nav = document.getElementById("navbar");
            if (currentScroll < 10) nav.classList.remove("nav-up");
            else if (prevScroll < currentScroll) nav.classList.add("nav-up");
            else nav.classList.remove("nav-up");
            prevScroll = currentScroll;
        }

        async function load() {
            try {
                const res = await fetch(`${SHEET_URL}&t=${Date.now()}`);
                const text = await res.text();
                const lines = text.split(/\r?\n/).filter(l => l.length > 20);
                const sep = lines[0].includes(';') ? ';' : ',';

                dataStore = lines.slice(1).map(line => {
                    const cols = line.split(sep).map(c => c.replace(/"/g, '').trim());
                    const destination = cols[1] || "";
                    
                    // Extraction précise du chiffre pour le filtre (ex: "5 Jours" -> "5")
                    const dayMatch = (cols[3] || "").match(/\d+/);
                    
                    return {
                        date: cols[0],
                        dest: destination,
                        prix: cols[2],
                        duree: cols[3],
                        filterId: dayMatch ? dayMatch[0] : "",
                        bagage: cols[4] || "Non spécifié",
                        airline: cols[5],
                        plan: cols[6],
                        image: (cols[8] && cols[8].includes('http')) ? cols[8] : "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800",
                        isOrg: line.toLowerCase().includes("organise") || destination.toLowerCase().includes("voyage")
                    };
                });
                display(dataStore);
            } catch (e) { console.error(e); }
        }

        function display(list) {
            const container = document.getElementById('grid');
            container.innerHTML = list.length ? "" : "<p class='text-center py-20 col-span-full font-bold text-slate-400'>AUCUNE OFFRE TROUVÉE</p>";
            
            list.forEach(item => {
                container.innerHTML += `
                <div class="card-flight shadow-lg">
                    <div class="img-container">
                        <img src="${item.image}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800'">
                        <div class="absolute top-4 left-4 px-3 py-1 text-[9px] font-black text-white uppercase rounded-full ${item.isOrg ? 'bg-amber-500' : 'bg-slate-900'}">
                            ${item.isOrg ? 'Organisé' : 'Billet Flash'}
                        </div>
                    </div>
                    <div class="p-6">
                        <h2 class="text-xl font-black text-slate-900 uppercase italic italic tracking-tighter">${item.dest}</h2>
                        <p class="text-slate-400 font-bold text-[10px] uppercase mt-1 mb-4">${item.date} — <span class="text-blue-600">${item.duree}</span></p>
                        <div class="airline-label">${item.airline}</div>
                        <div class="price-box mb-6">
                            <div class="flex justify-between items-end mb-4">
                                <div><p class="text-[9px] font-bold text-slate-400 uppercase">Prix Total</p><span class="text-2xl font-black text-slate-900">${item.prix} <small class="text-xs">DA</small></span></div>
                                <div class="text-right"><p class="text-[9px] font-bold text-slate-400 uppercase">Bagage</p><span class="text-xs font-black text-slate-700 italic border-b-2 border-blue-200">${item.bagage}</span></div>
                            </div>
                            <p class="text-[10px] text-slate-600 italic leading-relaxed border-t border-slate-200 pt-4">${item.plan}</p>
                        </div>
                        <a href="https://wa.me/213558332601?text=Salam Hazar Travels, je réserve : ${item.dest}" target="_blank" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[11px] uppercase flex items-center justify-center gap-3 hover:bg-slate-800 transition-all">RÉSERVER <i class="fab fa-whatsapp text-lg text-green-400"></i></a>
                    </div>
                </div>`;
            });
        }

        function applyFilter(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            if (cat === 'all') display(dataStore);
            else if (cat === 'organise') display(dataStore.filter(i => i.isOrg));
            else display(dataStore.filter(i => i.filterId === cat));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        load();
    </script>
</body>
</html>
