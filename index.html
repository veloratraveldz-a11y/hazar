<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRESTA TOURS | B2B Catalogue</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --deep-blue: #0A1E3B; 
            --gold-elegant: #C5A059; 
            --bg-soft: #F8FAFC;
            --whatsapp-green: #128C7E;
            --turkish-red: #D92D20;
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-soft); color: var(--deep-blue); margin: 0; padding-top: 180px; }
        
        /* Navigation & Header */
        .nav-presta { 
            background: var(--deep-blue); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
            padding: 15px 20px; border-bottom: 3px solid var(--gold-elegant); 
            box-shadow: 0 4px 25px rgba(0,0,0,0.15);
        }

        /* Card Styles */
        .card-flight { background: white; border-radius: 30px; overflow: hidden; border: 1px solid #E5EBF1; transition: 0.4s; display: flex; flex-direction: column; position: relative; height: 100%; }
        .card-flight:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .img-container { height: 240px; position: relative; overflow: hidden; background: #e2e8f0; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s; }
        
        /* Badges & Logos */
        .status-badge { position: absolute; top: 20px; right: 20px; background: var(--gold-elegant); color: white; padding: 6px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; z-index: 10; }
        .status-badge.urgent { background: var(--turkish-red) !important; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .airline-container { position: absolute; top: 20px; left: 20px; display: flex; gap: 8px; z-index: 10; }
        .airline-logo-box { background: white; padding: 5px; border-radius: 10px; height: 35px; width: 35px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .airline-logo-box img { height: 20px; width: auto; object-fit: contain; }

        /* Program Modal */
        #programModal { display: none; position: fixed; inset: 0; background: rgba(10, 30, 59, 0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: white; border-radius: 30px; width: 100%; max-width: 500px; padding: 40px; position: relative; max-height: 85vh; overflow-y: auto; }

        .btn-whatsapp { background: var(--whatsapp-green); color: white; padding: 18px; border-radius: 20px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: auto; }
        .btn-program { background: white; border: 2px solid var(--gold-elegant); color: var(--deep-blue); padding: 14px; border-radius: 18px; font-weight: 700; width: 100%; margin-bottom: 12px; transition: 0.3s; }
        .btn-program:hover { background: var(--bg-soft); }

        .city-divider { grid-column: 1 / -1; display: flex; align-items: center; gap: 20px; margin: 50px 0 25px 0; }
        .city-divider h3 { font-weight: 800; font-size: 18px; text-transform: uppercase; color: var(--deep-blue); }
        .city-line { height: 2px; background: linear-gradient(90deg, var(--gold-elegant), transparent); flex-grow: 1; }

        footer { background: var(--deep-blue); color: white; padding: 60px 20px; border-top: 5px solid var(--gold-elegant); text-align: center; margin-top: 80px; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <nav class="nav-presta">
        <div class="max-w-7xl mx-auto flex flex-col gap-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 border-2 border-[var(--gold-elegant)] rounded-2xl flex items-center justify-center text-[var(--gold-elegant)] font-bold text-3xl">P</div>
                    <div>
                        <h1 class="text-white font-extrabold text-2xl tracking-tighter leading-none uppercase">PRESTA TOURS</h1>
                        <span class="text-[var(--gold-elegant)] font-bold text-[10px] uppercase tracking-[0.3em]">B2B Excellence 2026</span>
                    </div>
                </div>
                <a href="https://wa.me/213558332601" class="text-white bg-white/10 px-4 py-2 rounded-xl text-xs font-bold border border-white/20"><i class="fab fa-whatsapp mr-2"></i> WHATSAPP</a>
            </div>
        </div>
    </nav>

    <!-- Modal for Program -->
    <div id="programModal" onclick="closeProgram()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 id="m-title" class="text-2xl font-black mb-2 text-[var(--deep-blue)]"></h2>
            <div id="m-date" class="text-xs font-bold text-[var(--gold-elegant)] mb-6 uppercase"></div>
            <div id="m-body" class="text-slate-600 leading-relaxed whitespace-pre-line text-sm bg-slate-50 p-6 rounded-2xl border border-slate-100"></div>
            <button onclick="closeProgram()" class="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">FERMER</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Dynamic Content Loads Here -->
        </div>
    </main>

    <footer>
        <div class="max-w-4xl mx-auto">
            <h2 class="text-2xl font-black mb-4">PRESTA TOURS VOYAGES</h2>
            <p class="text-slate-400 text-sm mb-6">Kourifa Rachid 16302 El Harrach, Alger</p>
            <div class="flex justify-center gap-6 text-xl text-[var(--gold-elegant)]">
                <i class="fab fa-facebook"></i><i class="fab fa-instagram"></i><i class="fab fa-tiktok"></i>
            </div>
            <p class="mt-10 text-[10px] text-slate-500 uppercase tracking-widest">© 2026 Powered by Velora Travel Tech</p>
        </div>
    </footer>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";

        async function init() {
            try {
                const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim().length > 10);
                const sep = rows[0].includes(';') ? ';' : ',';

                const data = rows.slice(1).map(row => {
                    const c = row.split(sep).map(f => f.replace(/"/g, '').trim());
                    return { date: c[0], dest: c[1], prix: c[2], duree: c[3], bag: c[4], airline: c[5], plan: c[6], status: c[7], img: c[8] };
                });
                render(data);
            } catch (e) { console.error(e); }
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            const sections = items.reduce((acc, i) => {
                let s = i.status.toUpperCase().includes("VOYAGE") ? "Nos Voyages Organisés" : "Promotions Vols Secs";
                if (!acc[s]) acc[s] = []; acc[s].push(i); return acc;
            }, {});

            for (const [title, list] of Object.entries(sections)) {
                grid.innerHTML += `<div class="city-divider"><div class="city-line"></div><h3>${title}</h3><div class="city-line"></div></div>`;
                list.forEach(item => {
                    // Logic: Use provided image or auto-search Unsplash
                    const photo = item.img && item.img.length > 10 ? item.img.split(',')[0] : `https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1000&auto=format&fit=crop`;
                    
                    // Logic: Multi-airline logos
                    const logoHtml = item.airline.split('/').map(code => 
                        `<div class="airline-logo-box"><img src="https://img.logo.dev/https://${code.toLowerCase().trim()}.com?token=pk_dummy" onerror="this.parentElement.innerHTML='<span class=\'text-[8px] font-bold\'>${code}</span>'"></div>`
                    ).join('');

                    const isUrgent = item.status.includes("FLASH") || item.status.includes("REST");
                    const isVoyage = item.status.toUpperCase().includes("VOYAGE");

                    grid.innerHTML += `
                    <div class="card-flight">
                        <div class="img-container">
                            <div class="status-badge ${isUrgent ? 'urgent' : ''}">${item.status}</div>
                            <div class="airline-container">${logoHtml}</div>
                            <img src="${photo}" alt="${item.dest}">
                        </div>
                        <div class="p-8 flex flex-col flex-grow">
                            <h2 class="text-2xl font-black text-[var(--deep-blue)] uppercase tracking-tighter mb-1">${item.dest}</h2>
                            <p class="text-slate-400 font-bold text-xs mb-6 uppercase">${item.date} • ${item.duree}</p>
                            
                            <div class="flex justify-between items-end mb-8">
                                <div><span class="price-tag text-3xl font-black text-[var(--turkish-red)]">${item.prix} <small class="text-sm">DA</small></span></div>
                                <div class="text-[10px] font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-lg uppercase">${item.bag}</div>
                            </div>

                            ${isVoyage ? `<button onclick="openProgram('${item.dest}', '${item.date}', '${item.plan.replace(/'/g, "\\'")}')" class="btn-program">CONSULTER LE PROGRAMME</button>` : ''}
                            
                            <button onclick="sendWA('${item.dest}', '${item.prix}')" class="btn-whatsapp">RÉSERVER <i class="fab fa-whatsapp text-xl"></i></button>
                        </div>
                    </div>`;
                });
            }
        }

        function openProgram(title, date, plan) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-date').innerText = date;
            document.getElementById('m-body').innerText = plan;
            document.getElementById('programModal').style.display = 'flex';
        }

        function closeProgram() { document.getElementById('programModal').style.display = 'none'; }

        function sendWA(dest, prix) {
            const msg = encodeURIComponent(`Bonjour PRESTA TOURS, je souhaite réserver l'offre : ${dest} (${prix} DA).`);
            window.open(`https://wa.me/213558332601?text=${msg}`);
        }

        init();
    </script>
</body>
</html>
