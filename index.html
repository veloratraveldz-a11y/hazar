<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZAR TRAVELS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .nav-corporate { background: #0F172A; border-bottom: 4px solid #3B82F6; }
        .card-flight { background: white; border-radius: 24px; transition: all 0.3s ease; border: 1px solid #E2E8F0; overflow: hidden; display: flex; flex-direction: column; height: 100%; }
        .card-flight:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .tag-organise { background: linear-gradient(45deg, #F59E0B, #D97706); }
    </style>
</head>
<body>
    <nav class="nav-corporate px-6 py-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center text-white font-black text-xl uppercase italic">
            HAZAR TRAVELS
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="flight-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        <div id="empty-msg" class="hidden text-center py-20 text-slate-400 italic">Chargement des offres en cours ou tableau vide...</div>
    </main>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbe5nhU_ImNBu1ACWDVodOHJ6C7orVqdL84t5HkybnwOglhLzNC3fZ-rR9UeAX8G8AFTjCT85TNKgU/pub?gid=1910675952&single=true&output=csv";
        const myPhone = "213558332601";

        const logos = {
            "tk": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Turkish_Airlines_logo_2019.svg/1280px-Turkish_Airlines_logo_2019.svg.png",
            "ah": "https://upload.wikimedia.org/wikipedia/fr/thumb/3/36/Air_Alg%C3%A9rie_logo.svg/1200px-Air_Alg%C3%A9rie_logo.svg.png",
            "tu": "https://upload.wikimedia.org/wikipedia/fr/thumb/c/c5/Tunisair_logo.svg/1200px-Tunisair_logo.svg.png"
        };

        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split(/\r?\n/).slice(1);
                const container = document.getElementById('flight-container');
                container.innerHTML = "";

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 5) return;

                    const dest = cols[1].replace(/"/g, '').trim();
                    const airline = cols[5].replace(/"/g, '').trim().toLowerCase();
                    const isOrg = dest.toLowerCase().includes("organisé");
                    const img = (cols[8] && cols[8].includes('http')) ? cols[8].replace(/"/g, '').trim() : "https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=800";

                    container.innerHTML += `
                        <div class="card-flight shadow-lg">
                            <div class="relative h-48 overflow-hidden">
                                <img src="${img}" class="w-full h-full object-cover">
                                <div class="absolute top-4 left-4">
                                    ${isOrg ? '<span class="tag-organise text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">Voyage Organisé</span>' : `<img src="${logos[airline] || logos.tk}" class="h-6 bg-white/80 p-1 rounded">`}
                                </div>
                                <div class="absolute bottom-4 right-4 bg-red-600 text-white px-2 py-1 rounded text-[10px] font-bold animate-pulse">
                                    ${cols[7].replace(/"/g, '')} PLACES
                                </div>
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                <h3 class="text-xl font-black text-slate-800 uppercase italic mb-1">${dest}</h3>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">${cols[0].replace(/"/g, '')} | ${cols[3].replace(/"/g, '')}</p>
                                <div class="mt-auto flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                                    <div>
                                        <p class="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Prix</p>
                                        <span class="text-2xl font-black text-slate-900">${cols[2].replace(/"/g, '')} <small class="text-xs text-slate-500">DA</small></span>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Bagage</p>
                                        <span class="text-xs font-bold text-slate-700">${cols[4].replace(/"/g, '')}</span>
                                    </div>
                                </div>
                                <a href="https://wa.me/${myPhone}?text=Bonjour Hazar Travels, je souhaite réserver : ${dest}" target="_blank" class="mt-4 w-full bg-[#0F172A] text-white text-center py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-sky-600 transition-all">
                                    Réserver WhatsApp
                                </a>
                            </div>
                        </div>`;
                });
            } catch (err) {
                document.getElementById('empty-msg').classList.remove('hidden');
            }
        }
        loadData();
    </script>
</body>
</html>
