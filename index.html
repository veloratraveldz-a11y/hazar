<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRESTA TOURS | Smart Travel 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --deep-blue: #0A1E3B; --gold: #C5A059; --red: #D92D20; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; padding-top: 180px; }
        
        /* Navigation */
        .nav-presta { background: var(--deep-blue); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 15px 20px; border-bottom: 3px solid var(--gold); }
        
        /* Card & Images */
        .card-flight { background: white; border-radius: 24px; overflow: hidden; border: 1px solid #E5EBF1; display: flex; flex-direction: column; transition: 0.3s; }
        .img-container { height: 220px; position: relative; background: #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Badges */
        .badge { position: absolute; top: 15px; right: 15px; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; color: white; z-index: 10; }
        .badge-gold { background: var(--gold); }
        .badge-red { background: var(--red); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Airline Logos */
        .airline-logos { position: absolute; top: 15px; left: 15px; display: flex; gap: 5px; z-index: 10; }
        .airline-logo { background: white; padding: 4px; border-radius: 6px; height: 30px; width: 30px; object-fit: contain; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Buttons */
        .btn-main { background: #128C7E; color: white; padding: 15px; border-radius: 15px; font-weight: 800; text-align: center; width: 100%; transition: 0.2s; }
        .btn-details { background: white; border: 2px solid var(--gold); color: var(--deep-blue); padding: 12px; border-radius: 15px; font-weight: 700; width: 100%; margin-bottom: 10px; font-size: 13px; }
        
        /* Modal (Program View) */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 25px; max-width: 500px; width: 100%; padding: 30px; position: relative; max-height: 80vh; overflow-y: auto; }

        .city-divider { grid-column: 1 / -1; display: flex; align-items: center; gap: 15px; margin: 40px 0 20px 0; }
        .city-divider h3 { font-weight: 800; font-size: 16px; color: var(--deep-blue); text-transform: uppercase; }
        .city-line { height: 1px; background: #CBD5E1; flex-grow: 1; }
    </style>
</head>
<body>

    <!-- Modal for Program Details -->
    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-gray-400"><i class="fas fa-times"></i></button>
            <h2 id="modal-title" class="text-2xl font-black text-[var(--deep-blue)] mb-4"></h2>
            <div id="modal-body" class="text-slate-600 leading-relaxed whitespace-pre-line"></div>
            <button onclick="closeModal()" class="mt-8 w-full py-3 bg-slate-100 rounded-xl font-bold">Fermer</button>
        </div>
    </div>

    <nav class="nav-presta">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 border-2 border-[var(--gold)] rounded-xl flex items-center justify-center text-[var(--gold)] font-bold text-2xl">P</div>
                <div>
                    <h1 class="text-white font-black text-xl leading-none">PRESTA TOURS</h1>
                    <span class="text-[var(--gold)] text-[10px] font-bold tracking-widest uppercase">Travel Catalog 2026</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";

        async function init() {
            try {
                const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim().length > 10);
                const sep = rows[0].includes(';') ? ';' : ',';

                const data = rows.slice(1).map(row => {
                    const c = row.split(sep).map(f => f.replace(/"/g, '').trim());
                    return { date: c[0], dest: c[1], prix: c[2], duree: c[3], bag: c[4], airline: c[5], plan: c[6], status: c[7], img: c[8] };
                });
                render(data);
            } catch (e) { console.error(e); }
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            const sections = items.reduce((acc, i) => {
                let s = i.status.toUpperCase().includes("VOYAGE") ? "Voyages Organisés" : "Vols Secs";
                if (!acc[s]) acc[s] = []; acc[s].push(i); return acc;
            }, {});

            for (const [title, list] of Object.entries(sections)) {
                grid.innerHTML += `<div class="city-divider"><h3>${title}</h3><div class="city-line"></div></div>`;
                list.forEach(item => {
                    // 1. DYNAMIC DESTINATION IMAGE
                    const destImage = item.img && item.img.length > 10 ? item.img.split(',')[0] : `https://source.unsplash.com/800x600/?${item.dest.split(' ')[0]},travel`;

                    // 2. AIRLINE LOGO LOGIC
                    const airlineHtml = item.airline.split('/').map(code => 
                        `<img class="airline-logo" src="https://img.logo.dev/https://${code.toLowerCase().trim()}.com?token=pk_example" onerror="this.src='https://ui-avatars.com/api/?name=${code}&background=random'">`
                    ).join('');

                    const isUrgent = item.status.includes("FLASH") || item.status.includes("REST");
                    const isVoyage = item.status.toUpperCase().includes("VOYAGE");

                    grid.innerHTML += `
                    <div class="card-flight">
                        <div class="img-container">
                            <div class="airline-logos">${airlineHtml}</div>
                            <div class="badge ${isUrgent ? 'badge-red' : 'badge-gold'}">${item.status}</div>
                            <img src="${destImage}" alt="${item.dest}">
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h2 class="text-xl font-black text-[var(--deep-blue)] uppercase mb-1">${item.dest}</h2>
                            <p class="text-slate-400 font-bold text-[10px] mb-4">${item.date} • ${item.duree}</p>
                            
                            <div class="flex justify-between items-center mb-6">
                                <div>
                                    <span class="block text-[9px] text-slate-400 font-bold">PRIX</span>
                                    <span class="text-2xl font-black text-[var(--red)]">${item.prix} DA</span>
                                </div>
                                <div class="bg-slate-100 px-3 py-1 rounded-lg text-[10px] font-bold">${item.bag}</div>
                            </div>

                            ${isVoyage ? `<button onclick="openModal('${item.dest}', '${item.plan.replace(/'/g, "\\'")}')" class="btn-details">VOIR LE PROGRAMME</button>` : ''}
                            
                            <button onclick="sendWA('${item.dest}', '${item.prix}')" class="btn-main">RÉSERVER <i class="fab fa-whatsapp ml-2"></i></button>
                        </div>
                    </div>`;
                });
            }
        }

        function openModal(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = text;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function sendWA(dest, prix) {
            const msg = encodeURIComponent(`Bonjour PRESTA TOURS, je souhaite réserver : ${dest} (${prix} DA).`);
            window.open(`https://wa.me/213558332601?text=${msg}`);
        }

        init();
    </script>
</body>
</html>
