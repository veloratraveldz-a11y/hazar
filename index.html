<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZAR TRAVELS B2B | VENTE FLASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .flash-deal { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -12px rgba(239, 68, 68, 0.2); }
        .badge-flash { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#FDFDFD] text-slate-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 py-4 border-b border-slate-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-white font-extrabold text-xl shadow-lg shadow-red-200">H</div>
                <h1 class="text-xl font-black tracking-tight">HAZAR <span class="text-red-600 uppercase">Travels</span></h1>
            </div>
            <div class="flex items-center gap-2 bg-red-50 text-red-600 px-4 py-2 rounded-full font-bold text-xs uppercase tracking-widest badge-flash">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-600"></span>
                </span>
                Vente Flash en cours
            </div>
        </div>
    </nav>

    <header class="flash-deal py-16 px-6 text-white text-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <svg class="w-full h-full" fill="currentColor"><rect width="100%" height="100%" fill="url(#pattern)" /></svg>
        </div>
        <div class="relative z-10 max-w-4xl mx-auto">
            <h2 class="text-4xl md:text-6xl font-black mb-6 leading-tight">OFFRES FLASH ISTANBUL 🇹🇷</h2>
            <p class="text-red-100 text-xl font-medium">Prix exceptionnels - Places limitées - Réservez maintenant via WhatsApp</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16">
        
        <div class="mb-12">
            <h3 class="flex items-center gap-3 text-2xl font-extrabold text-slate-800 mb-8 border-l-4 border-red-600 pl-4 uppercase tracking-tight">
                Départ Constantine <span class="text-slate-400 text-sm font-normal">(Air Algérie)</span>
            </h3>
            <div id="gridConstantine" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <hr class="my-16 border-slate-100">

        <div>
            <h3 class="flex items-center gap-3 text-2xl font-extrabold text-slate-800 mb-8 border-l-4 border-sky-600 pl-4 uppercase tracking-tight">
                Départ Alger <span class="text-slate-400 text-sm font-normal">(Turkish Airlines)</span>
            </h3>
            <div id="gridAlger" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

    </main>

    <footer class="bg-slate-900 text-slate-500 py-12 text-center">
        <div class="max-w-7xl mx-auto px-6 font-bold uppercase tracking-widest text-xs">
            © 2026 HAZAR TRAVELS B2B | Experts en Voyages Professionnels
        </div>
    </footer>

    <script>
        const myPhone = "213558332601";
        const imgIst1 = "https://images.unsplash.com/photo-1541432901042-2d8bd64b4a9b?q=80&w=800"; // صورة مسجد
        const imgIst2 = "https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=800"; // صورة جسر

        // DATA CONSTANTINE
        const flightConst = [
            { date: "09 Mai - 17 Mai", price: "45.000", bag: "56kg", airline: "Air Algérie" },
            { date: "18 Mai - 26 Mai", price: "45.000", bag: "56kg", airline: "Air Algérie" }
        ];

        // DATA ALGER
        const flightAlger = [
            { date: "05 Mai - 08 Mai", price: "42.900", dep: "18:05", ret: "21:50", airline: "Turkish" },
            { date: "06 Mai - 09 Mai", price: "42.900", dep: "18:05", ret: "21:50", airline: "Turkish" },
            { date: "12 Mai - 15 Mai", price: "42.900", dep: "18:05", ret: "19:40", airline: "Turkish" },
            { date: "13 Mai - 16 Mai", price: "42.900", dep: "18:05", ret: "07:55", airline: "Turkish" },
            { date: "19 Mai - 22 Mai", price: "42.900", dep: "18:05", ret: "19:40", airline: "Turkish" },
            { date: "20 Mai - 23 Mai", price: "42.900", dep: "18:05", ret: "21:50", airline: "Turkish" }
        ];

        // RENDER CONSTANTINE
        const gridC = document.getElementById('gridConstantine');
        flightConst.forEach(f => {
            const msg = encodeURIComponent(`Bonjour Hazar Travels, je réserve l'OFFRE FLASH CONSTANTINE:\n📅 Dates: ${f.date}\n💰 Prix: ${f.price} DZD\n🧳 Bagages: ${f.bag}`);
            gridC.innerHTML += `
                <div class="bg-white rounded-[2rem] overflow-hidden border-2 border-red-50 card-hover flex flex-col md:flex-row shadow-xl shadow-red-900/5">
                    <img src="${imgIst1}" class="md:w-1/2 h-64 md:h-auto object-cover">
                    <div class="p-8 flex-grow">
                        <span class="bg-red-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Flash Deal</span>
                        <h4 class="text-2xl font-black mt-4 text-slate-800 uppercase">Constantine ⇄ IST</h4>
                        <div class="mt-4 space-y-2">
                            <div class="flex items-center gap-3 text-slate-600 font-bold"><i class="far fa-calendar-alt text-red-500"></i> ${f.date}</div>
                            <div class="flex items-center gap-3 text-slate-800 font-black"><i class="fas fa-suitcase-rolling text-emerald-500 text-lg"></i> 56 KG (2 valises)</div>
                        </div>
                        <div class="mt-8 flex justify-between items-center">
                            <span class="text-3xl font-black text-red-600">${f.price} <small class="text-sm font-bold text-slate-400">DA</small></span>
                            <a href="https://wa.me/${myPhone}?text=${msg}" target="_blank" class="bg-red-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-red-700 transition shadow-lg shadow-red-200">Réserver</a>
                        </div>
                    </div>
                </div>`;
        });

        // RENDER ALGER
        const gridA = document.getElementById('gridAlger');
        flightAlger.forEach(f => {
            const msg = encodeURIComponent(`Bonjour Hazar Travels, je réserve l'OFFRE ALGER (Turkish):\n📅 Dates: ${f.date}\n💰 Prix: ${f.price} DZD`);
            gridA.innerHTML += `
                <div class="bg-white rounded-3xl overflow-hidden border border-slate-100 card-hover shadow-lg shadow-slate-200/50">
                    <img src="${imgIst2}" class="w-full h-40 object-cover opacity-90">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-extrabold text-slate-800">Alger ⇄ Istanbul</h4>
                                <p class="text-xs text-slate-400 font-bold uppercase mt-1 tracking-wider">${f.date}</p>
                            </div>
                            <span class="bg-sky-50 text-sky-600 px-2 py-1 rounded text-[10px] font-bold uppercase">Turkish</span>
                        </div>
                        <div class="mt-6 flex justify-between items-end">
                            <div class="text-xl font-black text-slate-900">${f.price} <small class="text-[10px] text-slate-400">DA</small></div>
                            <a href="https://wa.me/${myPhone}?text=${msg}" target="_blank" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-sky-600 transition">Choisir</a>
                        </div>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
