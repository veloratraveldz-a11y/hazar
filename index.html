<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRESTA TOURS | Premium Travel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --deep-blue: #0A1E3B; --gold: #C5A059; --turkish-red: #E31C1C; --whatsapp: #25D366; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F0F4F8; color: var(--deep-blue); margin: 0; padding-top: 190px; }
        
        /* Fixed Header Architecture */
        .nav-presta { background: var(--deep-blue); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 4px solid var(--gold); }
        
        /* Filter System */
        .filter-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; background: rgba(0,0,0,0.2); }
        .filter-btn { background: rgba(255,255,255,0.1); color: white; padding: 12px 22px; border-radius: 14px; font-weight: 800; font-size: 11px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15); white-space: nowrap; transition: 0.3s; }
        .filter-btn.active { background: var(--gold); border-color: var(--gold); box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4); }
        .btn-voyage-filter.active { background: #7C3AED !important; border-color: #7C3AED !important; }

        /* Card Master Design */
        .card-flight { background: white; border-radius: 35px; overflow: hidden; display: flex; flex-direction: column; height: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); border: 1px solid rgba(0,0,0,0.03); }
        .card-flight:hover { transform: translateY(-15px); box-shadow: 0 40px 80px -20px rgba(0,0,0,0.2); }
        
        /* Image Engine */
        .img-container { height: 280px; position: relative; overflow: hidden; background: #1a1a1a; }
        .img-main { width: 100%; height: 100%; object-fit: cover; transition: 0.6s ease; }
        .card-flight:hover .img-main { transform: scale(1.1) rotate(1deg); }

        .badge-cat { position: absolute; top: 20px; left: 20px; background: white; color: var(--deep-blue); padding: 6px 15px; border-radius: 12px; font-weight: 900; font-size: 10px; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .badge-places { position: absolute; top: 20px; right: 20px; background: var(--turkish-red); color: white; padding: 6px 15px; border-radius: 12px; font-weight: 800; font-size: 10px; z-index: 10; }
        
        .price-text { color: var(--turkish-red); font-size: 34px; font-weight: 900; letter-spacing: -1.5px; }
        .da-label { font-size: 12px; font-weight: 800; color: #CBD5E1; margin-left: 4px; }

        .btn-action { background: var(--whatsapp); color: white; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; transition: 0.3s; box-shadow: 0 10px 20px -5px rgba(37, 211, 102, 0.4); }
        .btn-action:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        .btn-outline { border: 2px solid #E2E8F0; color: var(--deep-blue); padding: 15px; border-radius: 20px; font-weight: 800; width: 100%; margin-bottom: 10px; font-size: 11px; text-transform: uppercase; transition: 0.3s; }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

        /* Pop-up Modal */
        #detailsModal { display: none; position: fixed; inset: 0; background: rgba(5, 15, 30, 0.95); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); }
        .modal-card { background: white; border-radius: 40px; width: 100%; max-width: 500px; padding: 40px; transform: translateY(0); transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="nav-presta">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-xl">
                    <span class="text-[var(--deep-blue)] font-black text-3xl italic">P</span>
                </div>
                <div>
                    <h1 class="text-white font-black text-2xl tracking-tighter leading-none">PRESTA TOURS</h1>
                    <p class="text-[var(--gold)] text-[10px] font-bold tracking-[3px] uppercase mt-1">L'excellence du voyage</p>
                </div>
            </div>
            <div class="hidden md:flex gap-4">
                <a href="#" class="text-white opacity-50 hover:opacity-100 transition"><i class="fab fa-instagram fa-lg"></i></a>
                <a href="#" class="text-white opacity-50 hover:opacity-100 transition"><i class="fab fa-tiktok fa-lg"></i></a>
            </div>
        </div>
        
        <div class="filter-container max-w-7xl mx-auto" id="filterBar">
            <button class="filter-btn active" onclick="filterData('all', this)">Tous les vols</button>
            <button class="filter-btn" onclick="filterData('7 Jours', this)">7 Jours</button>
            <button class="filter-btn" onclick="filterData('8 Jours', this)">8 Jours</button>
            <button class="filter-btn btn-voyage-filter" onclick="filterData('VOYAGE', this)">✨ Voyages Organisés</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Data will be injected here -->
        </div>
    </main>

    <div id="detailsModal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="mTitle" class="text-3xl font-black mb-4 tracking-tighter uppercase"></h2>
            <div id="mBody" class="text-slate-500 leading-relaxed whitespace-pre-line border-l-4 border-[var(--gold)] pl-6 italic mb-8"></div>
            <button onclick="document.getElementById('detailsModal').style.display='none'" class="w-full py-4 bg-[var(--deep-blue)] text-white rounded-2xl font-black uppercase tracking-widest">Fermer</button>
        </div>
    </div>

    <script>
        const GS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        let store = [];

        async function fetchData() {
            try {
                const response = await fetch(`${GS_URL}&nocache=${Date.now()}`);
                const data = await response.text();
                
                // HIGH-LEVEL PARSER: Matches columns even with commas inside quotes
                const rows = data.split(/\r?\n/).filter(row => row.trim().length > 0);
                const results = [];
                
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (columns) {
                        const clean = columns.map(v => v.replace(/"/g, '').trim());
                        results.push({
                            date: clean[0] || '',
                            dest: clean[1] || 'Destination',
                            prix: clean[2] || '---',
                            duree: clean[3] || '',
                            bagage: clean[4] || 'Incluse',
                            airline: clean[5] || 'TK',
                            plan: clean[6] || '',
                            places: clean[7] || '',
                            image: clean[8] || '',
                            cat: (clean[9] || 'FLASH').toUpperCase()
                        });
                    }
                }
                store = results;
                renderItems(store);
            } catch (err) {
                console.error("Critical Error:", err);
            }
        }

        function filterData(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (type === 'all') renderItems(store);
            else if (type === 'VOYAGE') renderItems(store.filter(x => x.cat.includes('VOYAGE')));
            else renderItems(store.filter(x => x.duree.includes(type)));
        }

        function renderItems(list) {
            const container = document.getElementById('mainGrid');
            container.innerHTML = list.map((item, idx) => {
                // Fallback Image Logic
                const imgUrl = (item.image && item.image.length > 10) ? item.image : 
                               `https://images.unsplash.com/photo-1542296332-2e4473faf563?q=80&w=800&auto=format&fit=crop`;
                
                const logos = item.airline.split(/[/,]+/).map(code => 
                    `<img class="h-7 bg-white p-1 rounded-lg shadow-sm" src="https://www.gstatic.com/flights/airline_logos/70px/${code.trim()}.png" onerror="this.remove()">`
                ).join('');

                return `
                <div class="card-flight">
                    <div class="img-container">
                        <div class="badge-cat">${item.cat}</div>
                        <div class="badge-places">${item.places || 'VOL CONFIRMÉ'}</div>
                        <img src="${imgUrl}" class="img-main" loading="lazy">
                        <div class="absolute bottom-4 left-4 flex gap-2 z-20">${logos}</div>
                    </div>
                    <div class="p-8 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[var(--gold)] text-[10px] font-black uppercase tracking-[2px] mb-1 italic">✈️ Départ Alger</p>
                                <h3 class="text-2xl font-black tracking-tighter uppercase leading-none">${item.dest}</h3>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4 mb-6">
                            <span class="text-xs font-bold text-slate-400"><i class="far fa-calendar-alt mr-1"></i> ${item.date}</span>
                            <span class="text-xs font-bold text-slate-400"><i class="far fa-clock mr-1"></i> ${item.duree}</span>
                        </div>

                        <div class="flex items-center gap-2 mb-8">
                            <span class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase">
                                <i class="fas fa-suitcase mr-1"></i> Bagage: ${item.bagage}
                            </span>
                        </div>

                        <div class="mb-8 flex items-baseline">
                            <span class="price-text">${item.prix}</span>
                            <span class="da-label">DA</span>
                        </div>

                        <div class="mt-auto space-y-3">
                            ${item.plan.length > 5 ? `<button onclick="openM('${item.dest}', \`${item.plan.replace(/'/g, "\\'")}\`)" class="btn-outline">Détails Programme</button>` : ''}
                            <button onclick="bookWA('${item.dest}', '${item.prix}')" class="btn-action">
                                <i class="fab fa-whatsapp text-xl"></i> RÉSERVER MAINTENANT
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openM(t, b) {
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mBody').innerText = b;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function bookWA(d, p) {
            window.open(`https://wa.me/213558332601?text=Bonjour, je souhaite réserver le vol vers ${d} au prix de ${p} DA.`);
        }

        fetchData();
    </script>
</body>
</html>
