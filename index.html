<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZAR TRAVELS B2B | Portail Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .card-hover { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        #adminPanel { display: none; background: #fff; border: 2px solid #e2e8f0; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .admin-mode #adminPanel { display: block; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900">

    <nav class="sticky top-0 z-50 glass px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="askAdminPassword()">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">H</div>
                <h1 class="text-xl font-bold tracking-tight">HAZAR <span class="text-sky-600">TRAVELS</span></h1>
            </div>
            <div class="flex gap-4">
                <a href="platinum.html" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition">Créer Reçu</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="adminPanel" class="shadow-xl">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">Ajouter une nouvelle offre</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <input type="text" id="offTitle" placeholder="Titre de l'offre" class="p-2 border rounded">
                <input type="number" id="offPrice" placeholder="Prix (DZD)" class="p-2 border rounded">
                <input type="text" id="offImg" placeholder="URL de l'image" class="p-2 border rounded">
                <select id="offCat" class="p-2 border rounded">
                    <option value="Visa">Visa</option>
                    <option value="Omra">Omra</option>
                    <option value="Flight">Vol</option>
                    <option value="Package">Voyage Organisé</option>
                </select>
            </div>
            <button onclick="addOffer()" class="mt-4 bg-sky-600 text-white px-6 py-2 rounded-lg font-bold">Publier l'offre</button>
        </div>

        <div id="catalogGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const myPhone = "213558332601"; 
        let offers = JSON.parse(localStorage.getItem('hazar_offers')) || [];

        function askAdminPassword() {
            const pass = prompt("Mot de passe administrateur :");
            if (pass === "karimzerouaia2026@") {
                document.body.classList.add('admin-mode');
                alert("Mode Admin Activé !");
                renderOffers();
            }
        }

        function addOffer() {
            const title = document.getElementById('offTitle').value;
            const price = document.getElementById('offPrice').value;
            const img = document.getElementById('offImg').value || 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=800';
            const cat = document.getElementById('offCat').value;

            if(title && price) {
                const newOffer = { id: Date.now(), title, price, img, cat };
                offers.push(newOffer);
                localStorage.setItem('hazar_offers', JSON.stringify(offers));
                renderOffers();
                document.getElementById('offTitle').value = '';
                document.getElementById('offPrice').value = '';
            }
        }

        function deleteOffer(id) {
            if(confirm("Supprimer l'offre ?")) {
                offers = offers.filter(o => o.id !== id);
                localStorage.setItem('hazar_offers', JSON.stringify(offers));
                renderOffers();
            }
        }

        function renderOffers() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';
            offers.forEach(off => {
                const whatsappMsg = encodeURIComponent(`Bonjour Hazar Travels, je suis intéressé par l'offre : ${off.title} au prix de ${off.price} DZD.`);
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm card-hover relative border border-slate-100 p-6">
                        <img src="${off.img}" class="w-full h-52 object-cover rounded-xl mb-4">
                        <span class="text-xs font-bold text-sky-600 uppercase">${off.cat}</span>
                        <h3 class="text-xl font-bold mt-2">${off.title}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-2xl font-extrabold">${off.price} <small class="text-sm font-normal text-slate-500">DZD</small></span>
                            <a href="https://wa.me/${myPhone}?text=${whatsappMsg}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                                <i class="fab fa-whatsapp"></i> Réserver
                            </a>
                        </div>
                        <button onclick="deleteOffer(${off.id})" class="admin-only mt-4 text-red-500 text-sm hidden">Supprimer</button>
                    </div>`;
            });
            if(document.body.classList.contains('admin-mode')) {
                document.querySelectorAll('.admin-only').forEach(btn => btn.classList.remove('hidden'));
            }
        }
        renderOffers();
    </script>
</body>
</html>
