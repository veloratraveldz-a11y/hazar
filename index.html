<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRESTA TOURS | B2B Catalogue</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --deep-blue: #0A1E3B; 
            --gold-elegant: #C5A059; 
            --bg-soft: #F8FAFC;
            --whatsapp-green: #128C7E;
            --turkish-red: #D92D20;
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-soft); color: var(--deep-blue); margin: 0; padding-top: 180px; }
        
        /* Navbar with Smart Hide/Show */
        .nav-presta { 
            background: var(--deep-blue); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
            padding: 15px 20px; border-bottom: 3px solid var(--gold-elegant); 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 25px rgba(0,0,0,0.15);
        }
        .nav-hidden { transform: translateY(-100%); }

        /* Navigation Filters */
        .filter-container { background: white; padding: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; border-radius: 20px; border: 1px solid #E2E8F0; }
        .filter-btn { padding: 8px 18px; border-radius: 12px; font-weight: 700; font-size: 11px; text-transform: uppercase; border: 2px solid #E2E8F0; transition: 0.3s; cursor: pointer; }
        .filter-btn.active { background: var(--deep-blue); color: white; border-color: var(--deep-blue); }

        /* Ultimate Card with Zoom */
        .card-flight { background: white; border-radius: 30px; overflow: hidden; border: 1px solid #E5EBF1; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; position: relative; height: 100%; }
        .card-flight:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(10,30,59,0.15); }
        
        .img-container { height: 280px; position: relative; overflow: hidden; background: #e2e8f0; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .slider-wrapper img { min-width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card-flight:hover .slider-wrapper img { transform: scale(1.1); }

        /* Badges & Logistics */
        .status-badge { position: absolute; top: 20px; right: 20px; background: var(--gold-elegant); color: white; padding: 6px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; z-index: 30; }
        .status-badge.urgent { background: var(--turkish-red) !important; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .airline-container { position: absolute; top: 20px; left: 20px; display: flex; gap: 8px; z-index: 30; }
        .logo-box { background: white; padding: 5px; border-radius: 8px; height: 35px; width: 35px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .logo-box img { max-height: 22px; width: auto; }

        /* Program Modal */
        #detailsModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: white; border-radius: 35px; width: 100%; max-width: 500px; padding: 40px; position: relative; max-height: 85vh; overflow-y: auto; }

        .btn-whatsapp { background: var(--whatsapp-green); color: white; padding: 18px; border-radius: 20px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; }
        .btn-whatsapp:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-details { background: white; border: 2px solid var(--gold-elegant); color: var(--deep-blue); padding: 14px; border-radius: 18px; font-weight: 700; width: 100%; margin-bottom: 12px; transition: 0.2s; cursor: pointer; }
        
        .city-divider { grid-column: 1 / -1; display: flex; align-items: center; gap: 20px; margin: 40px 0 20px 0; }
        .city-divider h3 { font-weight: 800; font-size: 18px; text-transform: uppercase; color: var(--deep-blue); letter-spacing: 1px; }
        .city-line { height: 2px; background: linear-gradient(90deg, var(--gold-elegant), transparent); flex-grow: 1; }

        footer { background: var(--deep-blue); color: white; padding: 60px 20px; border-top: 5px solid var(--gold-elegant); text-align: center; margin-top: 80px; }
    </style>
</head>
<body>

    <nav class="nav-presta" id="navbar">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 border-2 border-[var(--gold-elegant)] rounded-2xl flex items-center justify-center text-[var(--gold-elegant)] font-bold text-3xl">P</div>
                <h1 class="text-white font-extrabold text-2xl tracking-tighter uppercase">PRESTA TOURS</h1>
            </div>
            <a href="https://wa.me/213558332601" target="_blank" class="text-white bg-white/10 px-4 py-2 rounded-xl text-xs font-bold border border-white/20 uppercase tracking-widest hover:bg-white hover:text-[var(--deep-blue)] transition-all duration-300">
                <i class="fab fa-whatsapp mr-2"></i> Contact Direct
            </a>
        </div>
    </nav>

    <div id="detailsModal" onclick="closeDetails()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-black text-[var(--deep-blue)] mb-6 uppercase tracking-tighter"></h2>
            <div id="modalBody" class="text-slate-600 whitespace-pre-line text-base leading-relaxed bg-slate-50 p-6 rounded-3xl border border-slate-100"></div>
            <button onclick="closeDetails()" class="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-bold uppercase tracking-wider">Fermer le Programme</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6">
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterBy('all', this)">Tous</button>
            <button class="filter-btn" onclick="filterBy('4 Jours', this)">4 Jours</button>
            <button class="filter-btn" onclick="filterBy('7 Jours', this)">7 Jours</button>
            <button class="filter-btn" onclick="filterBy('8 Jours', this)">8 Jours</button>
            <button class="filter-btn" onclick="filterBy('VOYAGE', this)">Voyages Organisés</button>
        </div>
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <footer>
        <div class="max-w-4xl mx-auto">
            <h2 class="text-3xl font-black mb-4 tracking-tighter uppercase">PRESTA TOURS VOYAGES</h2>
            <p class="text-slate-400 text-sm mb-10 font-medium">Kourifa Rachid 16302 El Harrach, Alger</p>
            <div class="flex justify-center gap-12 mb-12">
                <a href="https://www.facebook.com/prestatour/" target="_blank" class="text-[var(--gold-elegant)] text-3xl hover:text-white transition-all"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/presta_tours_/" target="_blank" class="text-[var(--gold-elegant)] text-3xl hover:text-white transition-all"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@prestatours" target="_blank" class="text-[var(--gold-elegant)] text-3xl hover:text-white transition-all"><i class="fab fa-tiktok"></i></a>
            </div>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.5em] font-bold">© 2026 Powered by Velora Travel Tech</p>
        </div>
    </footer>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        let masterData = [];

        // Navbar Animation Logic
        let lastScroll = 0;
        window.addEventListener("scroll", () => {
            const currentScroll = window.pageYOffset;
            const navbar = document.getElementById("navbar");
            if (currentScroll > lastScroll && currentScroll > 150) navbar.classList.add("nav-hidden");
            else navbar.classList.remove("nav-hidden");
            lastScroll = currentScroll;
        });

        async function init() {
            try {
                const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim().split(/[;,]/).length > 6);
                const sep = rows[0].includes(';') ? ';' : ',';

                masterData = rows.slice(1).map(row => {
                    const c = row.split(sep).map(f => f.replace(/"/g, '').trim());
                    return { date: c[0], dest: c[1], prix: c[2], duree: c[3], bag: c[4], airline: c[5], plan: c[6], status: c[7], img: c[8] };
                }).filter(i => i.dest && i.prix && i.prix.length > 3);
                
                render(masterData);
            } catch (e) { console.error("Data Load Error:", e); }
        }

        function filterBy(criteria, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(criteria === 'all') render(masterData);
            else if(criteria === 'VOYAGE') render(masterData.filter(i => i.status.toUpperCase().includes('VOYAGE')));
            else render(masterData.filter(i => i.duree.includes(criteria)));
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            const sections = items.reduce((acc, i) => {
                let s = i.status.toUpperCase().includes("VOYAGE") ? "Nos Voyages Organisés" : "Promotions Vols Secs";
                if (!acc[s]) acc[s] = []; acc[s].push(i); return acc;
            }, {});

            for (const [title, list] of Object.entries(sections)) {
                grid.innerHTML += `<div class="city-divider"><div class="city-line"></div><h3>${title}</h3><div class="city-line"></div></div>`;
                list.forEach((item, idx) => {
                    const isVoyage = item.status.toUpperCase().includes("VOYAGE");
                    const isUrgent = item.status.toUpperCase().match(/FLASH|REST|[0-9]/);
                    
                    const logos = item.airline ? item.airline.split('/').map(code => 
                        `<div class="logo-box"><img src="https://www.gstatic.com/flights/airline_logos/70px/${code.toUpperCase().trim()}.png" onerror="this.src='https://ui-avatars.com/api/?name=${code}'"></div>`
                    ).join('') : '';

                    // SMART IMAGE ENGINE: Use Sheet image OR auto-generate based on destination
                    let imgSource = item.img ? item.img.split(',').map(u => u.trim()) : [];
                    if (imgSource.length === 0 || item.img.includes('رابط')) {
                        const city = item.dest.split('→').pop().trim();
                        imgSource = [
                            `https://source.unsplash.com/800x600/?${city},travel`,
                            `https://source.unsplash.com/800x600/?${city},city`,
                            `https://source.unsplash.com/800x600/?${city},landmark`
                        ];
                    }

                    let imgHtml = `<div class="slider-wrapper" id="slider-${title.replace(/\s/g,'')}-${idx}">`;
                    imgSource.forEach(url => {
                        imgHtml += `<img src="${url}" alt="${item.dest}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?auto=format&fit=crop&w=800'">`;
                    });
                    imgHtml += `</div>`;

                    grid.innerHTML += `
                    <div class="card-flight">
                        <div class="img-container">
                            <div class="status-badge ${isUrgent ? 'urgent' : ''}">${item.status}</div>
                            <div class="airline-container">${logos}</div>
                            ${imgHtml}
                        </div>
                        <div class="p-8 flex flex-col flex-grow">
                            <h2 class="text-2xl font-black text-[var(--deep-blue)] uppercase tracking-tight mb-1">${item.dest}</h2>
                            <p class="text-slate-400 font-bold text-xs mb-6 uppercase tracking-widest">${item.date} • ${item.duree}</p>
                            <div class="flex justify-between items-end mb-8">
                                <span class="text-3xl font-black text-[var(--turkish-red)]">${item.prix} <small class="text-sm font-bold">DA</small></span>
                                <span class="text-[10px] font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-lg uppercase tracking-wider">${item.bag}</span>
                            </div>
                            ${isVoyage ? `<button onclick="openDetails('${item.dest}', '${item.plan.replace(/'/g, "\\'")}')" class="btn-details uppercase tracking-wider">Consulter Programme</button>` : ''}
                            <button onclick="sendWA('${item.dest}', '${item.prix}')" class="btn-whatsapp uppercase tracking-wider">Réserver <i class="fab fa-whatsapp text-xl"></i></button>
                        </div>
                    </div>`;

                    if (imgSource.length > 1) {
                        let c = 0;
                        setInterval(() => {
                            const s = document.getElementById(`slider-${title.replace(/\s/g,'')}-${idx}`);
                            if (s) { c = (c + 1) % imgSource.length; s.style.transform = `translateX(-${c * 100}%)`; }
                        }, 4000);
                    }
                });
            }
        }

        function openDetails(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = text;
            document.getElementById('detailsModal').style.display = 'flex';
        }
        function closeDetails() { document.getElementById('detailsModal').style.display = 'none'; }
        function sendWA(dest, prix) {
            const msg = encodeURIComponent(`Bonjour PRESTA TOURS, je souhaite réserver l'offre : ${dest} (${prix} DA).`);
            window.open(`https://wa.me/213558332601?text=${msg}`);
        }
        init();
    </script>
</body>
</html>
