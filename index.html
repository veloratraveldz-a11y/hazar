<script>
    const myPhone = "213558332601";
    // Votre lien CSV reste le même
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbe5nhU_ImNBu1ACWDVodOHJ6C7orVqdL84t5HkybnwOglhLzNC3fZ-rR9UeAX8G8AFTjCT85TNKgU/pub?gid=1910675952&single=true&output=csv";
    
    const logos = {
        "tk": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Turkish_Airlines_logo_2019.svg/1280px-Turkish_Airlines_logo_2019.svg.png",
        "ah": "https://upload.wikimedia.org/wikipedia/fr/thumb/3/36/Air_Alg%C3%A9rie_logo.svg/1200px-Air_Alg%C3%A9rie_logo.svg.png",
        "tu": "https://upload.wikimedia.org/wikipedia/fr/thumb/c/c5/Tunisair_logo.svg/1200px-Tunisair_logo.svg.png"
    };

    const cityImgs = {
        "istanbul": "https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=800",
        "tunis": "https://images.unsplash.com/photo-1596128330964-629d39739149?q=80&w=800",
        "default": "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=800"
    };

    let allFlights = [];

    async function init() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const rows = text.split('\n').slice(1);

            allFlights = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 5) return null;
                
                const destination = cols[1].replace(/"/g, '').trim();
                const airlineKey = cols[5] ? cols[5].replace(/"/g, '').trim().toLowerCase() : "tk";
                // On récupère le lien de l'image dans la colonne I (index 8)
                const customImg = cols[8] ? cols[8].replace(/"/g, '').trim() : "";
                
                // Choix de l'image : Image perso > Image Ville > Image par défaut
                let displayImg = cityImgs.default;
                if (customImg && customImg.startsWith('http')) {
                    displayImg = customImg;
                } else if (destination.toLowerCase().includes("istanbul")) {
                    displayImg = cityImgs.istanbul;
                } else if (destination.toLowerCase().includes("tunis")) {
                    displayImg = cityImgs.tunis;
                }

                return {
                    date: cols[0].replace(/"/g, '').trim(),
                    dest: destination,
                    price: cols[2].replace(/"/g, '').trim().replace(" DA", ""),
                    days: cols[3].replace(/"/g, '').trim(),
                    bag: cols[4].replace(/"/g, '').trim(),
                    airlineLogo: logos[airlineKey] || logos["tk"],
                    places: cols[7] ? cols[7].replace(/"/g, '').trim() : "10+",
                    isOrganise: destination.toLowerCase().includes("organisé") || destination.toLowerCase().includes("pack"),
                    img: displayImg
                };
            }).filter(f => f !== null);

            renderFlights(allFlights);
        } catch (e) { console.error("Erreur CSV:", e); }
    }

    function renderFlights(list) {
        const container = document.getElementById('flight-container');
        const empty = document.getElementById('empty-msg');
        container.innerHTML = "";
        if (list.length === 0) { empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');

        list.forEach(o => {
            const badge = o.isOrganise 
                ? `<span class="tag-organise text-white text-[9px] font-black px-3 py-1 rounded-full uppercase shadow-md border border-white/20">Hôtel Inclus</span>`
                : `<img src="${o.airlineLogo}" class="logo-img" alt="Logo">`;

            container.innerHTML += `
            <div class="card-flight shadow-xl">
                <div class="relative h-56 overflow-hidden">
                    <img src="${o.img}" class="w-full h-full object-cover transform hover:scale-110 transition duration-700">
                    <div class="absolute top-4 left-4 bg-white/95 p-2 rounded-lg shadow-sm flex items-center justify-center min-w-[60px]">${badge}</div>
                    ${o.isOrganise ? '<div class="absolute top-4 right-4 bg-amber-500 text-white p-2 rounded-lg shadow-md"><i class="fas fa-star text-[10px]"></i></div>' : ''}
                    <div class="absolute bottom-4 right-4 bg-red-600 text-white px-3 py-1 rounded-md text-[9px] font-black uppercase animate-pulse italic">
                       <i class="fas fa-fire mr-1"></i> ${o.places} PLACES
                    </div>
                </div>
                <div class="p-6 flex flex-col flex-grow">
                    <h4 class="text-2xl font-black text-slate-800 mb-1 tracking-tighter uppercase italic leading-tight">${o.dest}</h4>
                    <div class="flex items-center gap-2 mb-6">
                        <span class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">${o.date}</span>
                        <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                        <span class="text-sky-600 font-black text-[10px] uppercase italic">${o.days}</span>
                    </div>
                    
                    <div class="flex items-center justify-between mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div>
                            <p class="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">Total Séjour</p>
                            <span class="text-3xl font-black text-slate-900">${o.price} <small class="text-xs">DA</small></span>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Bagage</p>
                            <span class="text-xs font-black text-slate-700">${o.bag}</span>
                        </div>
                    </div>
                    
                    <a href="https://wa.me/${myPhone}?text=${encodeURIComponent('Hazar Travels, intéressé par : ' + o.dest + ' (' + o.days + ') - ' + o.date)}" 
                       target="_blank" 
                       class="mt-auto w-full bg-[#0F172A] text-white py-4 rounded-xl font-black text-[11px] uppercase tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-sky-600 transition-all shadow-lg active:scale-95">
                        RESERVER <i class="fab fa-whatsapp text-lg text-green-400"></i>
                    </a>
                </div>
            </div>`;
        });
    }

    function filterType(type) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        if (type === 'all') renderFlights(allFlights);
        else if (type === 'organise') renderFlights(allFlights.filter(f => f.isOrganise));
        else renderFlights(allFlights.filter(f => f.days.includes(type) && !f.isOrganise));
    }

    init();
</script>
