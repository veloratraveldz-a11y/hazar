<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRESTA TOURS | Expert Voyages</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --deep-blue: #0A1E3B; 
            --gold: #C5A059; 
            --turkish-red: #E31C1C;
            --whatsapp: #25D366;
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: var(--deep-blue); margin: 0; padding-top: 80px; }
        
        /* Navigation */
        .nav-presta { 
            background: rgba(10, 30, 59, 0.98); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
            padding: 12px 20px; border-bottom: 2px solid var(--gold); backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
        .nav-hidden { transform: translateY(-100%); }

        /* Search & Filters */
        .search-area { background: var(--deep-blue); padding: 60px 20px; border-radius: 0 0 40px 40px; text-align: center; color: white; }
        .search-input { width: 100%; max-width: 600px; padding: 18px 25px; border-radius: 15px; border: none; font-weight: 600; color: var(--deep-blue); margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        /* Cards */
        .card-flight { 
            background: white; border-radius: 24px; overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); transition: 0.3s;
            display: flex; flex-direction: column; height: 100%; position: relative;
        }
        .card-flight:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .img-container { height: 250px; position: relative; overflow: hidden; background: #eee; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.5s ease-in-out; }
        .slider-wrapper img { min-width: 100%; height: 100%; object-fit: cover; }

        .status-badge { position: absolute; top: 15px; right: 15px; background: var(--turkish-red); color: white; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; z-index: 20; }
        .price-tag { color: var(--turkish-red); font-size: 26px; font-weight: 900; }

        /* Modal */
        #detailsModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: white; border-radius: 30px; width: 100%; max-width: 500px; padding: 35px; max-height: 80vh; overflow-y: auto; }

        /* Buttons */
        .btn-main { background: var(--whatsapp); color: white; padding: 14px; border-radius: 15px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; flex-grow: 1; }
        .btn-outline { border: 2px solid var(--gold); color: var(--deep-blue); padding: 12px; border-radius: 15px; font-weight: 700; width: 100%; margin-bottom: 10px; }

        .city-divider { grid-column: 1 / -1; margin: 30px 0 10px; font-size: 20px; font-weight: 800; color: var(--deep-blue); display: flex; align-items: center; gap: 15px; }
        .city-divider::after { content: ""; height: 2px; flex-grow: 1; background: linear-gradient(90deg, var(--gold), transparent); }
    </style>
</head>
<body>

    <nav class="nav-presta" id="navbar">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[var(--gold)] rounded-lg flex items-center justify-center text-white font-black text-xl">P</div>
                <span class="text-white font-black text-lg tracking-tighter uppercase">Presta Tours</span>
            </div>
            <a href="tel:0558332601" class="text-white bg-white/10 px-4 py-2 rounded-xl text-xs font-bold border border-white/20"><i class="fa fa-phone mr-2"></i> Appeler</a>
        </div>
    </nav>

    <div class="search-area">
        <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tighter">Trouvez votre prochain voyage</h1>
        <input type="text" id="searchInput" class="search-input" placeholder="Chercher une destination (ex: Istanbul, Bali...)" onkeyup="search()">
    </div>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <!-- Modal Détails -->
    <div id="detailsModal" onclick="closeDetails()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-2xl font-black mb-4 uppercase"></h2>
            <div id="modalBody" class="text-slate-600"></div>
            <button onclick="closeDetails()" class="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-bold uppercase">Fermer</button>
        </div>
    </div>

    <footer class="bg-[#0A1E3B] text-white py-12 text-center">
        <p class="font-bold text-lg">PRESTA TOURS VOYAGES</p>
        <p class="text-slate-400 text-sm mt-2">Kourifa Rachid 16302 El Harrach, Alger</p>
    </footer>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        let masterData = [];

        // Scroll Logic
        let lastScroll = 0;
        window.addEventListener("scroll", () => {
            const currentScroll = window.pageYOffset;
            const nav = document.getElementById("navbar");
            if (currentScroll > lastScroll && currentScroll > 100) nav.classList.add("nav-hidden");
            else nav.classList.remove("nav-hidden");
            lastScroll = currentScroll;
        });

        async function init() {
            try {
                const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim().split(/[;,]/).length > 6);
                const sep = rows[0].includes(';') ? ';' : ',';

                masterData = rows.slice(1).map(row => {
                    const c = row.split(sep).map(f => f.replace(/"/g, '').trim());
                    return { date: c[0], dest: c[1], prix: c[2], duree: c[3], bag: c[4], airline: c[5], plan: c[6], status: c[7], img: c[8] };
                }).filter(i => i.dest && i.prix);
                
                render(masterData);
            } catch (e) { console.error(e); }
        }

        function search() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            render(masterData.filter(i => i.dest.toLowerCase().includes(val)));
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            const sections = items.reduce((acc, i) => {
                let s = i.status.toUpperCase().includes("VOYAGE") ? "Voyages Organisés" : "Promotions Vols Secs";
                if (!acc[s]) acc[s] = []; acc[s].push(i); return acc;
            }, {});

            for (const [title, list] of Object.entries(sections)) {
                grid.innerHTML += `<div class="city-divider">${title}</div>`;
                list.forEach((item, idx) => {
                    const isVoyage = item.status.toUpperCase().includes("VOYAGE");
                    
                    // FIX IMAGE: Nettoyage des liens et images auto si vide
                    let rawImgs = item.img || "";
                    let imgSource = (rawImgs.includes('http')) 
                        ? rawImgs.split(',').map(u => u.trim()) 
                        : [`https://source.unsplash.com/800x600/?${item.dest.split('→').pop().trim()},travel`];

                    let imgHtml = `<div class="slider-wrapper" id="slider-${title.replace(/\s/g,'')}-${idx}">`;
                    imgSource.forEach(url => {
                        imgHtml += `<img src="${url}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109c0f3?w=800'">`;
                    });
                    imgHtml += `</div>`;

                    grid.innerHTML += `
                    <div class="card-flight">
                        <div class="img-container">
                            <div class="status-badge">${item.status}</div>
                            ${imgHtml}
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h2 class="text-xl font-black uppercase mb-1">${item.dest}</h2>
                            <p class="text-slate-400 text-xs font-bold mb-4">${item.date} • ${item.duree}</p>
                            
                            <div class="mb-6">
                                <div class="price-tag">${item.prix} <span class="text-sm">DA</span></div>
                                <div class="text-[10px] font-bold text-slate-500 uppercase mt-1">Bagage: ${item.bag}</div>
                            </div>

                            <div class="mt-auto">
                                ${isVoyage ? `<button onclick="openDetails('${item.dest}', '${item.plan.replace(/'/g, "\\'")}')" class="btn-outline uppercase text-xs">Voir le programme</button>` : ''}
                                <div class="flex gap-2">
                                    <a href="tel:0558332601" class="p-3 border-2 border-slate-200 rounded-xl text-slate-600"><i class="fa fa-phone"></i></a>
                                    <button onclick="sendWA('${item.dest}', '${item.prix}')" class="btn-main uppercase text-xs">
                                        <i class="fab fa-whatsapp"></i> Réserver
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;

                    if (imgSource.length > 1) {
                        let c = 0;
                        setInterval(() => {
                            const s = document.getElementById(`slider-${title.replace(/\s/g,'')}-${idx}`);
                            if (s) { c = (c + 1) % imgSource.length; s.style.transform = `translateX(-${c * 100}%)`; }
                        }, 4000);
                    }
                });
            }
        }

        function openDetails(dest, plan) {
            const modal = document.getElementById('detailsModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalTitle').innerText = dest;
            
            if(plan.includes('http') && plan.includes('.pdf')) {
                body.innerHTML = `<p class="mb-6">Programme PDF disponible :</p>
                    <a href="${plan}" target="_blank" class="flex items-center justify-center gap-3 bg-red-600 text-white p-4 rounded-2xl font-bold uppercase text-sm">
                        <i class="fas fa-file-pdf"></i> Ouvrir le PDF
                    </a>`;
            } else {
                body.innerHTML = `<div class="whitespace-pre-line leading-relaxed text-sm">${plan || 'Programme bientôt disponible...'}</div>`;
            }
            modal.style.display = 'flex';
        }

        function closeDetails() { document.getElementById('detailsModal').style.display = 'none'; }
        
        function sendWA(dest, prix) {
            const msg = encodeURIComponent(`Bonjour Presta Tours, je souhaite réserver l'offre ${dest} (${prix} DA).`);
            window.open(`https://wa.me/213558332601?text=${msg}`);
        }
        
        init();
    </script>
</body>
</html>
