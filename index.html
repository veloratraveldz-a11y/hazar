<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRESTA TOURS | Excellence Voyages Alger</title>
    
    <!-- Professional SEO: Google Rich Results -->
    <meta name="description" content="Agence Presta Tours Alger. Vols Istanbul, Voyages Organisés Malaisie, Vietnam, Bali.">
    <script type="application/ld+json" id="seo-schema"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --deep-blue: #0A1E3B; --gold: #C5A059; --turkish-red: #E31C1C; --whatsapp: #25D366; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; color: var(--deep-blue); margin: 0; padding-top: 180px; }
        
        /* Fixed Header Logic */
        .nav-presta { background: var(--deep-blue); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 3px solid var(--gold); transition: all 0.4s ease; }
        .nav-hidden { transform: translateY(-100%); }

        /* Brand Socials */
        .social-link { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.3s; background: rgba(255,255,255,0.1); }
        .link-tt:hover { background: #000 !important; }
        .link-ig:hover { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%) !important; }
        .link-fb:hover { background: #1877F2 !important; }

        /* Filters */
        .filter-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .filter-btn { background: rgba(255,255,255,0.05); color: white; padding: 10px 20px; border-radius: 14px; font-weight: 800; font-size: 11px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
        .filter-btn.active { background: var(--gold); color: white; border-color: var(--gold); }
        .btn-voyage-filter.active { background: #7C3AED !important; border-color: #7C3AED !important; }

        /* UI Cards */
        .card-flight { background: white; border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; height: 100%; border: 1px solid #EEF2F6; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-flight:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .card-voyage { border: 2px solid #7C3AED; }

        .img-container { height: 260px; position: relative; overflow: hidden; background: #111; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .slider-wrapper img { min-width: 100%; height: 100%; object-fit: cover; }

        .status-badge { position: absolute; top: 15px; right: 15px; background: var(--turkish-red); color: white; padding: 6px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; z-index: 30; }
        .airline-logo { background: white; padding: 5px; border-radius: 10px; height: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .price-tag { color: var(--turkish-red); font-size: 32px; font-weight: 900; }
        .btn-details { border: 2px solid var(--gold); color: var(--deep-blue); padding: 14px; border-radius: 18px; font-weight: 800; width: 100%; margin-bottom: 12px; font-size: 11px; text-transform: uppercase; }
        .btn-wa { background: var(--whatsapp); color: white; padding: 16px; border-radius: 18px; font-weight: 800; flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 20px -5px rgba(37, 211, 102, 0.4); }

        /* Modal */
        #detailsModal { display: none; position: fixed; inset: 0; background: rgba(10,30,59,0.98); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: white; border-radius: 40px; width: 100%; max-width: 600px; padding: 40px; position: relative; }
    </style>
</head>
<body>

    <nav class="nav-presta" id="smartHeader">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <!-- Smart Logo -->
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-lg transform rotate-3">
                    <span class="text-[var(--deep-blue)] font-black text-3xl italic">P</span>
                </div>
                <div>
                    <h1 class="text-white font-black text-2xl tracking-tighter leading-none">PRESTA TOURS</h1>
                    <div class="flex gap-2 mt-2">
                        <a href="#" class="social-link link-tt"><i class="fab fa-tiktok text-sm"></i></a>
                        <a href="#" class="social-link link-ig"><i class="fab fa-instagram text-sm"></i></a>
                        <a href="#" class="social-link link-fb"><i class="fab fa-facebook-f text-sm"></i></a>
                    </div>
                </div>
            </div>
            <a href="tel:0558332601" class="bg-[var(--gold)] text-white px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-xl hover:scale-105 transition">
                <i class="fa fa-phone mr-2"></i>Appeler
            </a>
        </div>
        
        <div class="filter-container max-w-7xl mx-auto">
            <button class="filter-btn active" onclick="filterBy('all', this)">Tous</button>
            <button class="filter-btn" onclick="filterBy('4 Jours', this)">4 Jours</button>
            <button class="filter-btn" onclick="filterBy('7 Jours', this)">7 Jours</button>
            <button class="filter-btn" onclick="filterBy('8 Jours', this)">8 Jours</button>
            <button class="filter-btn btn-voyage-filter" onclick="filterBy('VOYAGE', this)">✨ Voyages Organisés</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Items injected here -->
        </div>
    </main>

    <div id="detailsModal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-black mb-4 uppercase tracking-tighter"></h2>
            <div id="modalBody" class="text-slate-600 leading-relaxed whitespace-pre-line border-l-4 border-[var(--gold)] pl-6"></div>
            <button onclick="document.getElementById('detailsModal').style.display='none'" class="mt-8 w-full py-4 bg-[var(--deep-blue)] text-white rounded-2xl font-black uppercase">Fermer</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        let masterData = [];

        // Dynamic Header Logic
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const current = window.pageYOffset;
            const header = document.getElementById('smartHeader');
            if (current > lastScroll && current > 250) header.classList.add('nav-hidden');
            else header.classList.remove('nav-hidden');
            lastScroll = current;
        });

        // Professional Auto-Image Engine (Using Picsum for Stability)
        const getAutoImages = (dest) => {
            const id = Math.floor(Math.random() * 1000);
            return [
                `https://picsum.photos/seed/${id}/800/600`,
                `https://picsum.photos/seed/${id + 1}/800/600`,
                `https://picsum.photos/seed/${id + 2}/800/600`
            ];
        };

        async function init() {
            try {
                const res = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
                const text = await res.text();
                // Advanced CSV Parser to prevent column shifting
                const rows = text.split(/\r?\n/).filter(r => r.length > 20);
                
                masterData = rows.slice(1).map(row => {
                    // Regex to split by comma but ignore commas inside quotes
                    const c = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                    const clean = c.map(f => f.replace(/"/g, '').trim());
                    
                    return { 
                        date: clean[0], dest: clean[1], prix: clean[2], duree: clean[3],
                        bag: clean[4], air: clean[5], plan: clean[6], places: clean[7],
                        img: clean[8], category: (clean[9] || '').toUpperCase() 
                    };
                }).filter(i => i.dest);

                render(masterData);
            } catch (e) { console.error("System Error:", e); }
        }

        function filterBy(criteria, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(criteria === 'all') render(masterData);
            else if(criteria === 'VOYAGE') render(masterData.filter(i => i.category.includes('VOYAGE')));
            else render(masterData.filter(i => i.duree.includes(criteria)));
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            items.forEach((item, index) => {
                const isVoyage = item.category.includes("VOYAGE");
                
                // Image Logic: If no image in sheet, auto-generate based on destination
                let images = (item.img && item.img.length > 15) ? [item.img] : getAutoImages(item.dest);
                
                const airlines = (item.air || 'TK').split(/[,/]+/).map(code => 
                    `<img class="airline-logo" src="https://www.gstatic.com/flights/airline_logos/70px/${code.trim()}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/784/784306.png'">`
                ).join('');

                grid.innerHTML += `
                <div class="card-flight ${isVoyage ? 'card-voyage' : ''}">
                    <div class="img-container">
                        <div class="status-badge">${item.places || 'DISPONIBLE'}</div>
                        <div class="absolute top-4 left-4 z-20 flex gap-2">${airlines}</div>
                        <div class="slider-wrapper" id="slider-${index}">
                            ${images.map(src => `<img src="${src}" loading="lazy" alt="Voyage">`).join('')}
                        </div>
                    </div>
                    
                    <div class="p-8 flex flex-col flex-grow">
                        <span class="text-[var(--gold)] text-[10px] font-extrabold uppercase tracking-widest mb-2 italic">
                            ${isVoyage ? '✨ Voyage Organisé' : '✈️ Départ Alger'}
                        </span>
                        <h2 class="text-2xl font-black uppercase tracking-tighter mb-1">${item.dest}</h2>
                        <p class="text-slate-400 font-bold text-xs mb-6">${item.date} • ${item.duree}</p>
                        
                        <div class="flex items-center gap-2 mb-8">
                            <span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[10px] font-black uppercase">
                                <i class="fa fa-suitcase mr-1"></i> ${item.bag}
                            </span>
                        </div>

                        <div class="mb-8">
                            <span class="price-tag">${item.prix}</span>
                            <span class="text-[10px] font-black text-slate-300 uppercase ml-1">DA</span>
                        </div>

                        <div class="mt-auto">
                            ${item.plan.length > 10 ? `<button onclick="openModal('${item.dest}', \`${item.plan.replace(/"/g, "'")}\`)" class="btn-details">Détails du Programme</button>` : ''}
                            <button onclick="sendWA('${item.dest}', '${item.prix}')" class="btn-wa">
                                <i class="fab fa-whatsapp text-xl"></i> RÉSERVER
                            </button>
                        </div>
                    </div>
                </div>`;

                if(images.length > 1) startSlider(index, images.length);
            });
        }

        function startSlider(idx, count) {
            let i = 0;
            setInterval(() => {
                const el = document.getElementById(`slider-${idx}`);
                if(el) { i = (i + 1) % count; el.style.transform = `translateX(-${i * 100}%)`; }
            }, 3500 + (idx * 150));
        }

        function openModal(t, b) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalBody').innerText = b;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function sendWA(d, p) {
            const msg = encodeURIComponent(`Bonjour Presta Tours, je souhaite réserver : ${d} (${p} DA).`);
            window.open(`https://wa.me/213558332601?text=${msg}`);
        }

        init();
    </script>
</body>
</html>
