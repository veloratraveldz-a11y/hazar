<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA TRAVEL | Expert Voyage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0F172A; --accent: #3B82F6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; }
        .hero-bg { 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1200');
            background-size: cover; background-position: center;
        }
        .nav-velora { background: var(--primary); border-bottom: 3px solid var(--accent); }
        .filter-btn { transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); color: #94A3B8; cursor: pointer; padding: 8px 16px; border-radius: 12px; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        .card-flight { background: white; border-radius: 28px; transition: all 0.4s; border: 1px solid #E2E8F0; overflow: hidden; display: flex; flex-direction: column; }
        .card-flight:hover { transform: translateY(-10px); border-color: var(--accent); shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }
        .tag-special { background: linear-gradient(45deg, #F59E0B, #D97706); }
    </style>
</head>
<body>

    <nav class="nav-velora px-6 py-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-900 font-black text-2xl">V</div>
                <div>
                    <h1 class="text-white font-black text-2xl uppercase italic">Velora Travel</h1>
                    <p class="text-sky-400 text-[9px] font-bold uppercase tracking-[0.3em] mt-1">Hazar Travels Group</p>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="filterType('all')" id="btn-all" class="filter-btn active">Tous</button>
                <button onclick="filterType('4')" id="btn-4" class="filter-btn">4 Jours</button>
                <button onclick="filterType('7')" id="btn-7" class="filter-btn">7 Jours</button>
                <button onclick="filterType('8')" id="btn-8" class="filter-btn">8 Jours</button>
                <button onclick="filterType('organise')" id="btn-organise" class="filter-btn border-amber-500/30 text-amber-500">Organisé</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="flight-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-full">Chargement des billets...</p>
        </div>
    </main>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        
        const logos = {
            "tk": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Turkish_Airlines_logo_2019.svg/1280px-Turkish_Airlines_logo_2019.svg.png",
            "ah": "https://upload.wikimedia.org/wikipedia/fr/thumb/3/36/Air_Alg%C3%A9rie_logo.svg/1200px-Air_Alg%C3%A9rie_logo.svg.png",
            "tu": "https://upload.wikimedia.org/wikipedia/fr/thumb/c/c5/Tunisair_logo.svg/1200px-Tunisair_logo.svg.png"
        };

        let allFlights = [];

        async function init() {
            try {
                const res = await fetch(csvUrl + '&cb=' + Date.now());
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim().length > 10).slice(1);

                allFlights = rows.map(row => {
                    const cols = row.split(/[,;](?=(?:[^"]*"[^"]*")*[^"]*$)/);
                    const airlineCode = cols[5]?.replace(/"/g, '').trim().toLowerCase() || "";
                    const dest = cols[1]?.replace(/"/g, '').trim() || "";
                    
                    return {
                        date: cols[0]?.replace(/"/g, '').trim(),
                        dest: dest,
                        price: cols[2]?.replace(/"/g, '').trim(),
                        days: cols[3]?.replace(/"/g, '').trim(),
                        bag: cols[4]?.replace(/"/g, '').trim(),
                        logo: logos[airlineCode] || null,
                        plan: cols[6]?.replace(/"/g, '').trim() || "Consulter pour détails",
                        places: cols[7]?.replace(/"/g, '').trim() || "15",
                        isOrg: dest.toLowerCase().includes('organisé'),
                        img: (cols[8] && cols[8].length > 10) ? cols[8].replace(/"/g, '').trim() : "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=800"
                    };
                });
                renderFlights(allFlights);
            } catch (e) { console.error(e); }
        }

        function renderFlights(list) {
            const container = document.getElementById('flight-container');
            container.innerHTML = "";

            list.forEach(o => {
                const badge = o.isOrg 
                    ? `<div class="tag-special text-white text-[9px] font-black px-4 py-1.5 rounded-full uppercase italic">Voyage Organisé</div>`
                    : (o.logo ? `<div class="bg-white/90 p-2 rounded-lg shadow-sm"><img src="${o.logo}" class="h-4 object-contain"></div>` : '');

                container.innerHTML += `
                <div class="card-flight shadow-sm">
                    <div class="relative h-48">
                        <img src="${o.img}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4">${badge}</div>
                    </div>
                    <div class="p-6">
                        <h4 class="text-xl font-black text-slate-800 uppercase italic mb-1">${o.dest}</h4>
                        <p class="text-slate-400 font-bold text-[10px] uppercase mb-4">${o.date} | <span class="text-sky-600">${o.days}</span></p>
                        
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-2xl font-black text-slate-900">${o.price} <small class="text-xs">DA</small></span>
                                <span class="text-[10px] font-black text-slate-500"><i class="fas fa-suitcase"></i> ${o.bag}</span>
                            </div>
                            <div class="border-t border-slate-200 pt-3">
                                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1"><i class="fas fa-plane-departure mr-1"></i> Plan de vol :</p>
                                <p class="text-[10px] text-slate-700 font-semibold leading-relaxed">${o.plan}</p>
                            </div>
                        </div>
                        
                        <a href="https://wa.me/213558332601?text=Réservation : ${o.dest}" target="_blank" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase flex items-center justify-center gap-2">
                            RÉSERVER MAINTENANT <i class="fab fa-whatsapp text-lg"></i>
                        </a>
                    </div>
                </div>`;
            });
        }

        function filterType(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            if (type === 'all') renderFlights(allFlights);
            else if (type === 'organise') renderFlights(allFlights.filter(f => f.isOrg));
            else renderFlights(allFlights.filter(f => f.days.includes(type)));
        }

        init();
    </script>
</body>
</html>
