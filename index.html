<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZAR TRAVELS | Portail Officiel B2B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F1F5F9; }
        .nav-corporate { background: #0F172A; border-bottom: 4px solid #3B82F6; }
        .card-flight { background: white; border-radius: 24px; overflow: hidden; transition: all 0.3s ease; border: 1px solid #E2E8F0; }
        .card-flight:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-color: #3B82F6; }
        .hero-bg { background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1600'); background-size: cover; background-position: center; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .plan-entry { border-left: 4px solid #3B82F6; background: #F8FAFC; padding: 1rem; border-radius: 0 12px 12px 0; }
    </style>
</head>
<body>

    <nav class="nav-corporate px-6 py-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-[#0F172A] font-black text-2xl">H</div>
                <div>
                    <h1 class="text-white font-extrabold text-xl tracking-tight leading-none uppercase">Hazar Travels</h1>
                    <p class="text-sky-400 text-[9px] font-bold tracking-[0.3em] uppercase mt-1 text-sky-400">Professional Air Booking</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full animate-pulse uppercase tracking-tighter italic">Vente Flash</span>
            </div>
        </div>
    </nav>

    <header class="hero-bg py-20 px-6 text-center text-white">
        <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter uppercase italic">Promotions Billets d'avion</h2>
        <div class="w-20 h-1.5 bg-sky-500 mx-auto mb-6 rounded-full"></div>
        <p class="text-slate-300 text-lg max-w-2xl mx-auto font-light leading-relaxed">Accès exclusif B2B aux tarifs Turkish Airlines, Air Algérie et Tunisair.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16">
        
        <section class="mb-24">
            <div class="flex items-center gap-4 mb-10 border-b-2 border-slate-200 pb-4">
                <i class="fas fa-plane-departure text-3xl text-sky-600"></i>
                <h3 class="text-3xl font-black text-slate-800 uppercase tracking-tight">Départs depuis <span class="text-sky-600">Alger</span></h3>
            </div>
            <div id="gridAlger" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </section>

        <section class="mb-24">
            <div class="flex items-center gap-4 mb-10 border-b-2 border-slate-200 pb-4">
                <i class="fas fa-plane-departure text-3xl text-blue-800"></i>
                <h3 class="text-3xl font-black text-slate-800 uppercase tracking-tight">Départs depuis <span class="text-blue-800">Constantine</span></h3>
            </div>
            <div id="gridConst" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </section>

        <section id="sectionOran">
            <div class="flex items-center gap-4 mb-10 border-b-2 border-slate-200 pb-4">
                <i class="fas fa-plane-departure text-3xl text-orange-600"></i>
                <h3 class="text-3xl font-black text-slate-800 uppercase tracking-tight">Départs depuis <span class="text-orange-600">Oran</span></h3>
            </div>
            <div id="gridOran" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 text-slate-400 font-bold italic">
                En attente d'offres...
            </div>
        </section>

    </main>

    <div id="modal">
        <div class="bg-white rounded-[2rem] p-8 max-w-lg w-[94%] shadow-2xl relative border-t-[12px] border-sky-600 overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 transition text-3xl">
                <i class="fas fa-times-circle"></i>
            </button>
            <div id="modalContent"></div>
        </div>
    </div>

    <footer class="bg-[#0F172A] py-16 text-center">
        <p class="text-slate-500 text-[11px] font-black uppercase tracking-[0.5em]">Hazar Travels B2B Portal © 2026</p>
    </footer>

    <script>
        const myPhone = "213558332601";
        
        // Links for Images
        const imgIstanbul = "https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=800";
        const imgTunis = "https://images.unsplash.com/photo-1589110280455-90807090b875?q=80&w=800";

        const algerData = [
            { date: "05 - 08 Mai", price: "42.900", days: "4 Jours", company: "Turkish Airlines", img: imgIstanbul, plan: "TK 654: ALG 18:05 -> IST 23:40<br>TK 655: IST 21:50 -> ALG 23:30" },
            { date: "06 - 09 Mai", price: "42.900", days: "4 Jours", company: "Turkish Airlines", img: imgIstanbul, plan: "TK 654: ALG 18:05 -> IST 23:40<br>TK 655: IST 21:50 -> ALG 23:30" },
            { date: "12 - 15 Mai", price: "42.900", days: "4 Jours", company: "Turkish Airlines", img: imgIstanbul, plan: "TK 654: ALG 18:05 -> IST 23:40<br>TK 851: IST 19:40 -> ALG 21:25" },
            { date: "13 - 16 Mai", price: "42.900", days: "4 Jours", company: "Turkish Airlines", img: imgIstanbul, plan: "TK 654: ALG 18:05 -> IST 23:40<br>TK 651: IST 07:55 -> ALG 09:45" },
            { date: "19 - 22 Mai", price: "42.900", days: "4 Jours", company: "Turkish Airlines", img: imgIstanbul, plan: "TK 654: ALG 18:05 -> IST 23:40<br>TK 851: IST 19:40 -> ALG 21:25" },
            { date: "20 - 23 Mai", price: "42.900", days: "4 Jours", company: "Turkish Airlines", img: imgIstanbul, plan: "TK 654: ALG 18:05 -> IST 23:40<br>TK 655: IST 21:50 -> ALG 23:30" }
        ];

        const constData = [
            { date: "09 - 17 Mai", price: "45.000", days: "9 Jours", bag: "56 KG", company: "Air Algérie", img: imgIstanbul, plan: "<b>Vol Spécial Constantine - Istanbul</b><br>Bagage: 56kg (2 Valises de 28kg)<br>Départ direct CZL." },
            { date: "18 - 26 Mai", price: "45.000", days: "9 Jours", bag: "56 KG", company: "Air Algérie", img: imgIstanbul, plan: "<b>Vol Spécial Constantine - Istanbul</b><br>Bagage: 56kg (2 Valises de 28kg)<br>Départ direct CZL." }
        ];

        function render() {
            const ga = document.getElementById('gridAlger');
            const gc = document.getElementById('gridConst');
            algerData.forEach(o => ga.innerHTML += createCard(o));
            constData.forEach(o => gc.innerHTML += createCard(o));
        }

        function createCard(o) {
            return `
                <div class="card-flight shadow-lg flex flex-col h-full">
                    <div class="relative h-56">
                        <img src="${o.img}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-white/95 backdrop-blur px-4 py-1 rounded-full text-[10px] font-black uppercase text-sky-600 shadow-sm">
                            ${o.company}
                        </div>
                        <div class="absolute bottom-4 right-4 bg-red-600 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">
                            Vente Flash
                        </div>
                    </div>
                    <div class="p-8 flex-grow flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <h4 class="text-2xl font-black text-slate-800">${o.date}</h4>
                                <span class="text-sky-600 font-bold text-sm">${o.days}</span>
                            </div>
                            <div class="flex items-baseline gap-1 mb-6">
                                <span class="text-4xl font-black text-slate-900">${o.price}</span>
                                <span class="text-sm font-bold text-slate-400">DA</span>
                            </div>
                            ${o.bag ? `<p class="bg-emerald-50 text-emerald-700 p-3 rounded-xl text-xs font-black flex items-center gap-2 mb-6 border border-emerald-100 italic"><i class="fas fa-suitcase"></i> BAGAGE INCLUS: ${o.bag}</p>` : ''}
                        </div>
                        <button onclick="openPlan('${o.date}', '${o.price}', \`${o.plan}\`)" class="w-full bg-[#0F172A] text-white py-5 rounded-2xl font-extrabold hover:bg-sky-600 transition-all flex items-center justify-center gap-3 shadow-xl shadow-slate-200 uppercase tracking-tight">
                            Consulter le Plan de Vol <i class="fas fa-arrow-right text-xs text-sky-400"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function openPlan(date, price, plan) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            const msg = encodeURIComponent(`Bonjour Hazar Travels, je réserve l'offre :\n📅 Date: ${date}\n💰 Prix: ${price} DA\nMerci.`);
            
            content.innerHTML = `
                <div class="text-center mb-8">
                    <i class="fas fa-ticket-alt text-4xl text-sky-600 mb-4 block"></i>
                    <h3 class="text-2xl font-black text-slate-800 uppercase italic leading-none">Détails de Réservation</h3>
                    <p class="text-slate-400 font-bold text-xs mt-2 uppercase tracking-[0.2em]">${date}</p>
                </div>
                <div class="plan-entry text-slate-600 text-sm mb-10 leading-relaxed font-medium">
                    ${plan}
                </div>
                <div class="space-y-4">
                    <a href="https://wa.me/${myPhone}?text=${msg}" target="_blank" class="w-full bg-green-500 text-white py-5 rounded-2xl flex items-center justify-center gap-4 font-black shadow-xl shadow-green-100 hover:bg-green-600 transition-all">
                        <i class="fab fa-whatsapp text-2xl"></i> CONFIRMER SUR WHATSAPP
                    </a>
                    <button onclick="closeModal()" class="w-full text-slate-400 font-bold text-[10px] uppercase tracking-widest py-2">Retour aux offres</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        render();
    </script>
</body>
</html>
